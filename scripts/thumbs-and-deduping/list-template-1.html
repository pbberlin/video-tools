<!DOCTYPE html>
<html>
<head>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<style>
  body { font-family: sans-serif; background: #111; color: #eee; margin: 20px; }
  .grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
  @media(min-width: 768px) { .grid { grid-template-columns: 1fr 1fr; } }
  .chunk { background: #222; padding: 10px; border-radius: 8px; }
  .chunk img { width: 100%; height: auto; display: block; }
  .links { display: flex; justify-content: space-between; margin-top: 10px; }
  .links a { color: #4CAF50; text-decoration: none; padding: 5px 10px; background: #333; border-radius: 4px; font-size: 14px; }
  .links a:hover { background: #444; }
</style>
</head>
<body>
<h2>{{ baseName }}</h2>
<div class='grid'>
{% for chunk in chunks %}
  <div class='chunk'>
    <img src='{{ chunk.image }}' alt='chunk'>
    <div class='links'>
    {% for link in chunk.links %}
      <a href='{{ link.url }}'>{{ link.displayTime }}</a>
    {% endfor %}
    </div>
  </div>
{% endfor %}
</div>
</body>
</html>
